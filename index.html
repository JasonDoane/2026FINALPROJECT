
<!doctype html>
<!-- 
  Phaser.js Space Shooter Game - Main HTML File
  This file sets up the basic HTML structure for the game
-->
<html>
<head>
<!-- Meta tags for proper character encoding and mobile responsiveness -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Optimized Phaser Game</title>
<style>
/* CSS Reset and Game Container Styling */
html,body { 
  margin:0; /* Remove default browser margins */
  padding:0; /* Remove default browser padding */
  background:#000; /* Black background for full-screen experience */
  overflow:hidden; /* Prevent scrollbars */
}
#game-container { 
  width:800px; /* Fixed width */
  height:600px; /* Fixed height */
  position:absolute; /* Allow positioning */
  top:50%; /* Center vertically */
  left:50%; /* Center horizontally */
  transform:translate(-50%, -50%); /* Offset for perfect centering */
  border:3px solid white; /* White border */
  box-sizing:border-box; /* Include border in dimensions */
  overflow:hidden; /* Prevent any overflow */
}
</style>
</head>
<body>
<!-- Game Container: This div will be populated by Phaser.js with the game canvas -->
<div id="game-container"></div>

<!-- Phaser.js Game Engine Library -->
<script src="phaser.min.js"></script>
<!-- Main Game Logic and Implementation -->
<script src="main.js"></script>
</body>
</html>
